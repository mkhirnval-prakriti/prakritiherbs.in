<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prakriti Herbs CRM</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#f4f7f6;
margin:0;
padding:20px;
}

.menu button{
margin:5px;
padding:10px;
}

section{
display:none;
margin-top:20px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

input,textarea{
margin:5px;
padding:6px;
}

</style>

</head>

<body>

<h2>Prakriti Herbs CRM</h2>

<div class="menu">

<button onclick="show('dashboard')">Dashboard</button> <button onclick="show('attendance')">Attendance</button> <button onclick="show('staff')">Staff</button> <button onclick="show('commission')">Commission</button> <button onclick="show('messages')">Messages</button> <button onclick="show('notice')">Notice</button>

</div>

<section id="dashboard">

<h3>Dashboard</h3>
<p>Welcome to Prakriti Herbs CRM</p>

</section>

<section id="attendance">

<h3>Attendance Punch</h3>

<button onclick="punchIn()">Punch In</button> <button onclick="punchOut()">Punch Out</button>

<p id="punchStatus"></p>

</section>

<section id="staff">

<h3>Add Staff</h3>

<input id="staffName" placeholder="Name">
<input id="staffMobile" placeholder="Mobile">
<input id="staffSalary" placeholder="Basic Salary">

<button onclick="addStaff()">Add Staff</button>

<table>

<thead>

<tr>
<th>Name</th>
<th>Mobile</th>
<th>Salary</th>
</tr>

</thead>

<tbody id="staffList"></tbody>

</table>

</section>

<section id="commission">

<h3>Commission Calculator</h3>

<input id="amount" placeholder="Amount">

<button onclick="calcCommission()">Calculate</button>

<p id="commissionResult"></p>

</section>

<section id="messages">

<h3>Send Message</h3>

<textarea id="msg"></textarea>

<button onclick="sendMessage()">Send</button>

</section>

<section id="notice">

<h3>Notice Board</h3>

<input id="noticeTitle" placeholder="Title">

<textarea id="noticeText"></textarea>

<button onclick="publishNotice()">Publish</button>

</section>

<script>

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_PROJECT.firebaseapp.com",

databaseURL:"https://YOUR_PROJECT-default-rtdb.firebaseio.com/",

projectId:"YOUR_PROJECT",

storageBucket:"YOUR_PROJECT.appspot.com"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

function show(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

function punchIn(){

const today = new Date().toISOString().slice(0,10)

db.ref("attendance/"+today+"/demo").update({

punchIn:new Date().toLocaleTimeString()

})

document.getElementById("punchStatus").innerText="Punch In Recorded"

}

function punchOut(){

const today = new Date().toISOString().slice(0,10)

db.ref("attendance/"+today+"/demo").update({

punchOut:new Date().toLocaleTimeString()

})

document.getElementById("punchStatus").innerText="Punch Out Recorded"

}

function addStaff(){

const name=document.getElementById("staffName").value
const mobile=document.getElementById("staffMobile").value
const salary=document.getElementById("staffSalary").value

db.ref("staff").push({

name:name,
mobile:mobile,
salary:salary

})

alert("Staff Added")

}

function calcCommission(){

const amt=parseFloat(document.getElementById("amount").value)

let commission

if(amt<1000){

commission=10

}else{

commission=(amt-1000)*0.10

}

document.getElementById("commissionResult").innerText="Commission: "+commission

}

function sendMessage(){

const msg=document.getElementById("msg").value

db.ref("messages").push({

text:msg,
time:Date.now()

})

alert("Message Sent")

}

function publishNotice(){

const title=document.getElementById("noticeTitle").value
const text=document.getElementById("noticeText").value

db.ref("notices").push({

title:title,
text:text,
time:Date.now()

})

alert("Notice Published")

}

</script>

</body>
</html>
